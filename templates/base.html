{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammad Jann | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background-color: #f0f0f0; }
        .brutal-card { background: white; border: 4px solid black; box-shadow: 8px 8px 0px 0px #000; transition: 0.2s; }
        .brutal-card:hover { transform: translate(-4px, -4px); box-shadow: 12px 12px 0px 0px #000; }
        .brutal-btn { background: #FFDE00; border: 3px solid black; box-shadow: 4px 4px 0px 0px #000; font-weight: bold; padding: 10px 20px; display: inline-block; text-transform: uppercase; }
        .brutal-btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px 0px #000; }
    </style>
</head>
<body class="p-4">
    <nav class="max-w-6xl mx-auto mb-10 flex justify-between items-center border-4 border-black bg-white p-5 brutal-card">
        <h1 class="text-2xl font-black tracking-tighter italic">JANN.DEV <span class="text-blue-600">v1.0</span></h1>
        <div class="space-x-6 font-bold uppercase text-sm hidden md:flex">
            <a href="/" class="hover:underline decoration-4 decoration-yellow-400">Home</a>
            <a href="/about" class="hover:underline decoration-4 decoration-blue-400">About</a>
            <a href="/projects" class="hover:underline decoration-4 decoration-green-400">Projects</a>
            <a href="/contact" class="brutal-btn bg-white">Contact</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
