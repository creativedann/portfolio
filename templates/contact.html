{% extends 'base.html' %}
{% block content %}
<div class="max-w-4xl mx-auto brutal-card p-10 bg-white">
    <h2 class="text-5xl font-black uppercase mb-4">Let's Talk! 🚀</h2>
    <p class="font-bold mb-8 text-gray-600 border-b-4 border-black pb-4">
        📧 jaanmallah16@gmail.com | 📍 Sindh, Pakistan
    </p>

    <form method="POST" class="space-y-6">
        {% csrf_token %}
        <div class="grid md:grid-cols-2 gap-6">
            <input type="text" name="name" placeholder="YOUR NAME" class="w-full border-4 border-black p-4 font-bold focus:bg-yellow-50 outline-none" required>
            <input type="email" name="email" placeholder="YOUR EMAIL" class="w-full border-4 border-black p-4 font-bold focus:bg-yellow-50 outline-none" required>
        </div>
        <textarea name="message" rows="5" placeholder="YOUR MESSAGE" class="w-full border-4 border-black p-4 font-bold focus:bg-yellow-50 outline-none" required></textarea>
        <button type="submit" class="brutal-btn w-full text-xl py-4 bg-green-400">Send Message 📬</button>
    </form>
</div>
{% endblock %}
