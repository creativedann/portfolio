{% extends 'base.html' %}
{% block content %}
<h2 class="text-5xl font-black uppercase mb-10 inline-block bg-white border-4 border-black px-4 shadow-[8px_8px_0px_black]">My Work</h2>
<div class="grid md:grid-cols-3 gap-8">
    {% for project in projects %}
    <div class="brutal-card p-6 bg-white flex flex-col">
        <div class="h-48 bg-gray-200 border-2 border-black mb-4 overflow-hidden">
            <!-- Agar image field hai to ye use karein -->
            {% if project.image %}
            <img src="{{ project.image.url }}" class="w-full h-full object-cover">
            {% endif %}
        </div>
        <h3 class="text-2xl font-black uppercase mb-2">{{ project.title }}</h3>
        <p class="font-bold text-gray-600 mb-6 flex-grow">{{ project.description }}</p>
        <a href="{{ project.link }}" class="brutal-btn text-center text-sm">View Project</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
