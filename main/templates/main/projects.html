{% extends 'main/base.html' %}

{% block content %}

<div style="padding: 20px 0;">

    <!-- Heading -->
    <p style="color: #6c63ff; font-size: 16px;">My Work</p>
    <h1 style="font-size: 45px; margin: 10px 0;">Projects 🚀</h1>
    <div style="width: 60px; height: 4px; background: #6c63ff; margin-bottom: 40px;"></div>

    <!-- Projects Grid -->
    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px;">

        {% for project in projects %}
        <div style="background: #111; padding: 25px; border-radius: 10px; border: 1px solid #222;">
            
            <h2 style="color: #fff; margin-bottom: 10px;">{{ project.title }}</h2>
            <p style="color: #aaa; line-height: 1.7; margin-bottom: 15px;">{{ project.description }}</p>
            
            <p style="color: #6c63ff; font-size: 13px; margin-bottom: 15px;">
                🛠️ {{ project.tech_stack }}
            </p>

            {% if project.github_link %}
            <a href="{{ project.github_link }}" 
               style="color: #6c63ff; text-decoration: none; font-size: 14px;">
                GitHub →
            </a>
            {% endif %}

        </div>
        {% endfor %}

    </div>

</div>

{% endblock %}
