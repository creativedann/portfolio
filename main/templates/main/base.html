<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhammad Jann — Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
        }

        /* NAVBAR */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            z-index: 100;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 1px;
        }

        .logo span {
            color: #6c63ff;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        nav ul a {
            color: #aaa;
            text-decoration: none;
            font-size: 15px;
            transition: color 0.3s;
        }

        nav ul a:hover {
            color: #6c63ff;
        }

        /* CONTAINER */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 120px 20px 60px;
        }

        /* BUTTONS */
        .btn {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #6c63ff;
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: #5a52d5;
        }

        .btn-outline {
            border: 1px solid #6c63ff;
            color: #6c63ff;
            background: transparent;
        }

        .btn-outline:hover {
            background: #6c63ff;
            color: white;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Muhammad<span>Jann</span></div>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/projects">Projects</a></li>
            <li><a href="/contact">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
